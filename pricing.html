<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型广场 - AnPin AI</title>
    <style>
        :root{--bg:#f3f4f6;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--accent:#8b5cf6;--card:#fff;--nav-bg:rgba(255,255,255,.72)}
        *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}a{text-decoration:none;color:inherit}
        body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .page{min-height:100vh;display:flex;flex-direction:column}

        .nav{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;position:relative;z-index:10;background:#fff;border-bottom:1px solid var(--border);animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
        .nav-logo{font-size:1.15rem;font-weight:800;display:flex;align-items:center;gap:10px;letter-spacing:-.5px;transition:opacity .3s}
        .nav-logo:hover{opacity:.8}
        .logo-img{width:30px;height:30px;border-radius:7px;object-fit:cover}
        .nav-links{display:flex;gap:20px;align-items:center;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:8px 26px;border-radius:40px;border:1px solid rgba(0,0,0,.04);box-shadow:0 2px 12px rgba(0,0,0,.03);font-size:.86rem;font-weight:500}
        .nav-links a{color:var(--muted);transition:all .3s cubic-bezier(.22,1,.36,1);position:relative}
        .nav-links a:hover,.nav-links a.active{color:var(--accent)}
        .nav-links a.active::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
        .btn-console{background:linear-gradient(135deg,#18181b,#27272a);color:#fff;padding:8px 22px;border-radius:30px;font-size:.86rem;font-weight:600;transition:all .35s cubic-bezier(.22,1,.36,1)}
        .btn-console:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}

        .container{max-width:1440px;margin:0 auto;padding:28px 32px;flex:1}

        /* 统计卡片 */
        .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .05s both}
        .stat-card{background:var(--card);border-radius:14px;padding:18px 22px;display:flex;align-items:center;gap:14px;border:1px solid var(--border);transition:all .3s cubic-bezier(.22,1,.36,1)}
        .stat-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.05);transform:translateY(-1px)}
        .stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
        .stat-icon.total{background:#f0fdf4;color:#16a34a}
        .stat-icon.anthropic{background:#fff7ed;color:#ea580c}
        .stat-icon.openai{background:#f0fdf4;color:#16a34a}
        .stat-label{font-size:.76rem;color:var(--muted);font-weight:500;margin-bottom:2px}
        .stat-value{font-size:1.6rem;font-weight:800;letter-spacing:-.5px}

        /* 搜索与筛选 */
        .toolbar{background:var(--card);border-radius:14px;padding:16px 22px;margin-bottom:20px;border:1px solid var(--border);display:flex;align-items:center;gap:16px;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .1s both}
        .search-wrap{flex:1;position:relative}
        .search-wrap input{width:100%;padding:10px 16px 10px 38px;border:1px solid var(--border);border-radius:10px;font-size:.88rem;background:#f9fafb;outline:none;transition:all .3s}
        .search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,92,246,.06);background:#fff}
        .search-wrap .s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:.9rem}

        .filter-tabs{display:flex;gap:8px;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .15s both;margin-bottom:20px}
        .filter-tab{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:10px;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .3s cubic-bezier(.22,1,.36,1)}
        .filter-tab:hover{border-color:#d1d5db;color:var(--text)}
        .filter-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(139,92,246,.04)}
        .filter-tab .f-icon{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
        .f-anthropic{background:#fff7ed;color:#ea580c}
        .f-openai{background:#f0fdf4;color:#16a34a}
        .filter-tab .count{background:#f3f4f6;padding:1px 8px;border-radius:8px;font-size:.72rem;font-weight:600;color:var(--muted)}

        /* 模型卡片 */
        .model-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
        .model-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;transition:all .35s cubic-bezier(.22,1,.36,1);animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both}
        .model-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.07);border-color:#d1d5db;transform:translateY(-2px)}

        .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
        .card-provider-row{display:flex;align-items:center;gap:8px}
        .provider-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
        .provider-icon.p-anthropic{background:#fff7ed;color:#ea580c}
        .provider-icon.p-openai{background:#f0fdf4;color:#16a34a}
        .card-info{display:flex;flex-direction:column}
        .card-model-name{font-size:.88rem;font-weight:700;color:var(--text);line-height:1.3}
        .card-provider-name{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

        .card-tags{display:flex;gap:4px;flex-shrink:0}
        .c-tag{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.3px}
        .c-tag.t-full{background:#dcfce7;color:#16a34a}
        .c-tag.t-v1{background:#fee2e2;color:#ef4444}
        .c-tag.t-s1{background:#dbeafe;color:#3b82f6}

        .card-feature{margin:12px 0 16px;font-size:.76rem;font-weight:600;display:flex;align-items:center;gap:4px}
        .card-feature.feat-anthropic{color:#ea580c}
        .card-feature.feat-openai{color:#16a34a}

        .price-rows{display:flex;flex-direction:column;gap:8px}
        .price-row{display:flex;align-items:center;justify-content:space-between}
        .price-row-left{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);font-weight:500}
        .price-row-left .p-icon{font-size:.72rem}
        .price-row-right{font-size:.88rem;font-weight:700;color:var(--text)}
        .price-row-right .unit{font-size:.68rem;font-weight:500;color:var(--muted)}
        .price-divider{height:1px;background:var(--border);margin:4px 0}

        .footer-wrap{border-top:1px solid var(--border);padding:20px 0;margin-top:auto;background:#fff}
        .footer{max-width:1440px;margin:0 auto;padding:0 32px;display:flex;justify-content:space-between;font-size:.78rem;color:#9ca3af;flex-wrap:wrap;gap:10px}
        .footer-links{display:flex;gap:20px}
        .footer-links a{transition:color .3s}
        .footer-links a:hover{color:var(--accent)}

        @media(max-width:1200px){.model-grid{grid-template-columns:repeat(3,1fr)}}
        @media(max-width:900px){.model-grid{grid-template-columns:repeat(2,1fr)}.stats-row{grid-template-columns:1fr}}
        @media(max-width:768px){
            .nav{padding:14px 16px;flex-wrap:wrap;gap:10px}.nav-links{display:none}
            .container{padding:20px 16px}
            .model-grid{grid-template-columns:1fr}
            .footer{flex-direction:column;align-items:center;text-align:center}
        }
    </style>
</head>
<body>
<div class="page">
    <header class="nav">
        <a href="index.html" class="nav-logo"><img src="logo.png" alt="AnPin AI" class="logo-img"> AnPin AI</a>
        <nav class="nav-links">
            <a href="index.html">首页</a>
            <a href="pricing.html" class="active">模型广场</a>
            <a href="tutorial.html">教程</a>
            <a href="docs.html">文档</a>
        </nav>
        <a href="https://anpin.ai/login?redirect=/logen" class="btn-console" target="_top">控制台 ↗</a>
    </header>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon total">📊</div>
                <div><div class="stat-label">模型总数</div><div class="stat-value" id="total-count">11</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon anthropic">✦</div>
                <div><div class="stat-label">ANTHROPIC</div><div class="stat-value" id="anthropic-count">6</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon openai">◎</div>
                <div><div class="stat-label">OPENAI</div><div class="stat-value" id="openai-count">5</div></div>
            </div>
        </div>

        <!-- 搜索栏 -->
        <div class="toolbar">
            <div class="search-wrap">
                <span class="s-icon">🔍</span>
                <input type="text" id="search" placeholder="搜索模型..." oninput="filterModels()">
            </div>
        </div>

        <!-- 筛选标签 -->
        <div class="filter-tabs" id="filters">
            <div class="filter-tab active" onclick="setFilter('all',this)">
                全部 <span class="count" id="tab-all">11</span>
            </div>
            <div class="filter-tab" onclick="setFilter('anthropic',this)">
                <span class="f-icon f-anthropic">✦</span> Anthropic <span class="count" id="tab-anthropic">6</span>
            </div>
            <div class="filter-tab" onclick="setFilter('openai',this)">
                <span class="f-icon f-openai">◎</span> OpenAI <span class="count" id="tab-openai">5</span>
            </div>
        </div>

        <!-- 模型卡片 -->
        <div class="model-grid" id="grid"></div>
    </div>

    <div class="footer-wrap">
        <footer class="footer">
            <div>&copy; 2026 AnPin AI. 保留所有权利.</div>
            <div class="footer-links">
                <a href="docs.html">文档</a>
                <a href="terms.html">服务条款</a>
                <a href="privacy.html">隐私政策</a>
                <a href="policy.html">使用政策</a>
            </div>
        </footer>
    </div>
</div>

<script>
const models=[
    {name:"claude-haiku-4-5-20251001",platform:"anthropic",input:1.00,output:5.00,cache_write:1.25,cache_read:0.100},
    {name:"claude-opus-4-5-20251101",platform:"anthropic",input:5.00,output:25.00,cache_write:6.25,cache_read:0.500},
    {name:"claude-opus-4-6",platform:"anthropic",input:5.00,output:25.00,cache_write:6.25,cache_read:0.500},
    {name:"claude-opus-4-7",platform:"anthropic",input:5.00,output:25.00,cache_write:6.25,cache_read:0.500},
    {name:"claude-sonnet-4-5-20250929",platform:"anthropic",input:3.00,output:15.00,cache_write:3.75,cache_read:0.300},
    {name:"claude-sonnet-4-6",platform:"anthropic",input:3.00,output:15.00,cache_write:3.75,cache_read:0.300},
    {name:"gpt-5.2",platform:"openai",input:1.75,output:14.00,cache_write:0,cache_read:0.175},
    {name:"gpt-5.2-codex",platform:"openai",input:1.75,output:14.00,cache_write:0,cache_read:0.175},
    {name:"gpt-5.3-codex",platform:"openai",input:1.75,output:14.00,cache_write:0,cache_read:0.175},
    {name:"gpt-5.4",platform:"openai",input:2.50,output:15.00,cache_write:0,cache_read:0.250},
    {name:"gpt-5.4-mini",platform:"openai",input:0.750,output:4.50,cache_write:0,cache_read:0.075},
];

let currentFilter='all';

function priceStr(v){
    if(v===0) return '$0';
    if(v>=1) return '$'+v.toFixed(2);
    return '$'+v.toFixed(3);
}

function renderCard(m,i){
    const isAnthropic=m.platform==='anthropic';
    const pClass=isAnthropic?'p-anthropic':'p-openai';
    const pIcon=isAnthropic?'✦':'◎';
    const featClass=isAnthropic?'feat-anthropic':'feat-openai';
    const pName=isAnthropic?'ANTHROPIC':'OPENAI';

    return `<div class="model-card" data-platform="${m.platform}" data-name="${m.name}" style="animation-delay:${.18+i*.03}s">
        <div class="card-top">
            <div class="card-provider-row">
                <div class="provider-icon ${pClass}">${pIcon}</div>
                <div class="card-info">
                    <div class="card-model-name">${m.name}</div>
                    <div class="card-provider-name">${pName}</div>
                </div>
            </div>
            <div class="card-tags">
                <span class="c-tag t-full">完整</span>
                <span class="c-tag t-v1">V1</span>
                <span class="c-tag t-s1">S1</span>
            </div>
        </div>
        <div class="card-feature ${featClass}">✦ Prompt Caching</div>
        <div class="price-rows">
            <div class="price-row">
                <div class="price-row-left"><span class="p-icon">📥</span> 输入</div>
                <div class="price-row-right">${priceStr(m.input)}<span class="unit">/M</span></div>
            </div>
            <div class="price-row">
                <div class="price-row-left"><span class="p-icon">📤</span> 输出</div>
                <div class="price-row-right">${priceStr(m.output)}<span class="unit">/M</span></div>
            </div>
            <div class="price-divider"></div>
            <div class="price-row">
                <div class="price-row-left"><span class="p-icon">📝</span> 缓存写入</div>
                <div class="price-row-right">${priceStr(m.cache_write)}<span class="unit">/M</span></div>
            </div>
            <div class="price-row">
                <div class="price-row-left"><span class="p-icon">📖</span> 缓存读取</div>
                <div class="price-row-right">${priceStr(m.cache_read)}<span class="unit">/M</span></div>
            </div>
        </div>
    </div>`;
}

function filterModels(){
    const q=document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.model-card').forEach(c=>{
        const p=c.dataset.platform;
        const n=c.dataset.name;
        const matchP=currentFilter==='all'||p===currentFilter;
        const matchQ=!q||n.includes(q);
        c.style.display=matchP&&matchQ?'':'none';
    });
}

function setFilter(f,el){
    currentFilter=f;
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    filterModels();
}

document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('grid').innerHTML=models.map((m,i)=>renderCard(m,i)).join('');
});
</script>
</body>
</html>
