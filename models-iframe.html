<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型广场 - AnPin AI</title>
    <style>
        :root{--bg:#f3f4f6;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--accent:#8b5cf6;--card:#fff}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}

        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

        .container{max-width:1440px;margin:0 auto;padding:24px 28px}

        .page-header{margin-bottom:22px;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
        .page-header h1{font-size:1.3rem;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
        .page-header p{font-size:.82rem;color:var(--muted)}

        .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .05s both}
        .stat-card{background:var(--card);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;border:1px solid var(--border);transition:all .3s cubic-bezier(.22,1,.36,1)}
        .stat-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.05);transform:translateY(-1px)}
        .stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .stat-icon svg{width:18px;height:18px}
        .stat-icon.total{background:#f0fdf4;color:#16a34a}
        .stat-icon.anthropic{background:#fff7ed;color:#ea580c}
        .stat-icon.openai{background:#f0fdf4;color:#16a34a}
        .stat-icon.google{background:#eff6ff;color:#2563eb}
        .stat-icon.deepseek{background:#f5f3ff;color:#7c3aed}
        .stat-label{font-size:.72rem;color:var(--muted);font-weight:500;margin-bottom:2px}
        .stat-value{font-size:1.5rem;font-weight:800;letter-spacing:-.5px}

        .toolbar{background:var(--card);border-radius:12px;padding:14px 18px;margin-bottom:16px;border:1px solid var(--border);display:flex;align-items:center;gap:14px;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .1s both}
        .search-wrap{flex:1;position:relative}
        .search-wrap input{width:100%;padding:9px 14px 9px 36px;border:1px solid var(--border);border-radius:10px;font-size:.86rem;background:#f9fafb;outline:none;transition:all .3s;font-family:inherit}
        .search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,92,246,.06);background:#fff}
        .search-wrap .s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#9ca3af;display:flex;align-items:center}
        .search-wrap .s-icon svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

        .filter-tabs{display:flex;gap:7px;flex-wrap:wrap;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .15s both;margin-bottom:16px}
        .filter-tab{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:10px;font-size:.8rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .3s cubic-bezier(.22,1,.36,1)}
        .filter-tab:hover{border-color:#d1d5db;color:var(--text)}
        .filter-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(139,92,246,.04)}
        .filter-tab .f-icon{width:15px;height:15px;border-radius:4px;display:flex;align-items:center;justify-content:center}
        .filter-tab .f-icon svg{width:10px;height:10px}
        .f-anthropic{background:#fff7ed;color:#ea580c}
        .f-openai{background:#f0fdf4;color:#16a34a}
        .f-google{background:#eff6ff;color:#2563eb}
        .f-deepseek{background:#f5f3ff;color:#7c3aed}
        .filter-tab .count{background:#f3f4f6;padding:1px 7px;border-radius:8px;font-size:.7rem;font-weight:600;color:var(--muted)}

        .model-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
        .model-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .35s cubic-bezier(.22,1,.36,1);animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both}
        .model-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.07);border-color:#d1d5db;transform:translateY(-2px)}

        .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
        .card-provider-row{display:flex;align-items:center;gap:8px}
        .provider-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .provider-icon svg{width:14px;height:14px}
        .provider-icon.p-anthropic{background:#fff7ed;color:#ea580c}
        .provider-icon.p-openai{background:#f0fdf4;color:#16a34a}
        .provider-icon.p-google{background:#eff6ff;color:#2563eb}
        .provider-icon.p-deepseek{background:#f5f3ff;color:#7c3aed}
        .card-info{display:flex;flex-direction:column}
        .card-model-name{font-size:.85rem;font-weight:700;color:var(--text);line-height:1.3}
        .card-provider-name{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

        .card-rate{display:inline-flex;align-items:center;gap:3px;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:5px;background:linear-gradient(135deg,#fef3c7,#fde68a);color:#b45309;white-space:nowrap;letter-spacing:.2px}

        .card-feature{margin:12px 0 16px;font-size:.74rem;font-weight:600;display:flex;align-items:center;gap:4px}
        .card-feature svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .card-feature.feat-anthropic{color:#ea580c}
        .card-feature.feat-openai{color:#16a34a}
        .card-feature.feat-google{color:#2563eb}
        .card-feature.feat-deepseek{color:#7c3aed}

        .price-rows{display:flex;flex-direction:column;gap:7px}
        .price-row{display:flex;align-items:center;justify-content:space-between}
        .price-row-left{display:flex;align-items:center;gap:5px;font-size:.76rem;color:var(--muted);font-weight:500}
        .price-row-left .p-icon{display:inline-flex;align-items:center}
        .price-row-left .p-icon svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:.55}
        .price-row-right{font-size:.86rem;font-weight:700;color:var(--text)}
        .price-row-right .unit{font-size:.66rem;font-weight:500;color:var(--muted)}
        .price-divider{height:1px;background:var(--border);margin:3px 0}

        @media(max-width:1200px){.model-grid{grid-template-columns:repeat(3,1fr)}}
        @media(max-width:900px){.model-grid{grid-template-columns:repeat(2,1fr)}.stats-row{grid-template-columns:1fr}}
        @media(max-width:600px){
            .container{padding:16px 14px}
            .model-grid{grid-template-columns:1fr}
            .stats-row{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>模型广场</h1>
        <p>查看所有可用模型及定价，价格单位为 $/M tokens</p>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div class="toolbar">
        <div class="search-wrap">
            <span class="s-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
            <input type="text" id="search" placeholder="搜索模型..." oninput="filterModels()">
        </div>
    </div>

    <div class="filter-tabs" id="filters"></div>

    <div class="model-grid" id="grid"></div>
</div>

<script>
/*
 * ========================================
 *   在这里编辑模型和价格
 *   每个模型的字段说明：
 *   - name: 模型名称
 *   - platform: 平台 (anthropic / openai / google / deepseek)
 *   - input: 输入价格 ($/M tokens)
 *   - output: 输出价格 ($/M tokens)
 *   - cache_write: 缓存写入价格
 *   - cache_read: 缓存读取价格
 * ========================================
 */
var models = [
    {name:"claude-haiku-4-5-20251001", platform:"anthropic", input:1.00, output:5.00, cache_write:1.25, cache_read:0.100},
    {name:"claude-opus-4-5-20251101", platform:"anthropic", input:5.00, output:25.00, cache_write:6.25, cache_read:0.500},
    {name:"claude-opus-4-6", platform:"anthropic", input:5.00, output:25.00, cache_write:6.25, cache_read:0.500},
    {name:"claude-opus-4-7", platform:"anthropic", input:5.00, output:25.00, cache_write:6.25, cache_read:0.500},
    {name:"claude-sonnet-4-5-20250929", platform:"anthropic", input:3.00, output:15.00, cache_write:3.75, cache_read:0.300},
    {name:"claude-sonnet-4-6", platform:"anthropic", input:3.00, output:15.00, cache_write:3.75, cache_read:0.300},
    {name:"gpt-5.2", platform:"openai", input:1.75, output:14.00, cache_write:0, cache_read:0.175},
    {name:"gpt-5.2-codex", platform:"openai", input:1.75, output:14.00, cache_write:0, cache_read:0.175},
    {name:"gpt-5.3-codex", platform:"openai", input:1.75, output:14.00, cache_write:0, cache_read:0.175},
    {name:"gpt-5.4", platform:"openai", input:2.50, output:15.00, cache_write:0, cache_read:0.250},
    {name:"gpt-5.4-mini", platform:"openai", input:0.750, output:4.50, cache_write:0, cache_read:0.075},
];

var svg = {
    anthropic:'<svg viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M15.17 2.5h3.41L23 21.5h-3.63l-1.1-3.6h-5.36L11.81 21.5H8.18l6.99-19zm1.58 5.22l-1.93 5.96h3.82l-1.89-5.96z"/><path d="M5.99 2.5h3.42L3.78 21.5H.35L5.99 2.5z"/></svg>',
    openai:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.28 9.82a5.99 5.99 0 0 0-.52-4.91 6.05 6.05 0 0 0-6.51-2.9A6.07 6.07 0 0 0 4.98 4.18 6 6 0 0 0 .99 7.08a6.04 6.04 0 0 0 .74 7.1 5.98 5.98 0 0 0 .51 4.91 6.05 6.05 0 0 0 6.52 2.9 5.99 5.99 0 0 0 4.5 2.01 6.06 6.06 0 0 0 5.77-4.21 5.99 5.99 0 0 0 4-2.9 6.06 6.06 0 0 0-.75-7.07zM13.26 22.43a4.48 4.48 0 0 1-2.88-1.04l.14-.08 4.78-2.76a.8.8 0 0 0 .39-.68v-6.74l2.02 1.17a.07.07 0 0 1 .04.05v5.58a4.5 4.5 0 0 1-4.49 4.5zM3.6 18.3a4.47 4.47 0 0 1-.54-3.01l.14.08 4.78 2.76a.77.77 0 0 0 .78 0l5.84-3.37v2.33a.08.08 0 0 1-.03.06l-4.84 2.79a4.5 4.5 0 0 1-6.13-1.64zM2.34 7.9a4.49 4.49 0 0 1 2.37-1.97V11.6a.77.77 0 0 0 .39.68l5.81 3.35-2.02 1.17a.08.08 0 0 1-.07 0L4 14.01a4.5 4.5 0 0 1-1.66-6.11zm16.6 3.85l-5.83-3.39L15.13 7.2a.08.08 0 0 1 .07 0l4.83 2.79a4.49 4.49 0 0 1-.68 8.1V12.43a.79.79 0 0 0-.41-.68zm2.01-3.02l-.14-.09-4.77-2.78a.78.78 0 0 0-.79 0l-5.84 3.37V6.9a.07.07 0 0 1 .03-.06l4.83-2.79a4.5 4.5 0 0 1 6.68 4.66zM8.31 12.86l-2.02-1.16a.08.08 0 0 1-.04-.06V6.08a4.5 4.5 0 0 1 7.38-3.45l-.14.08L8.71 5.47a.8.8 0 0 0-.39.68l-.01 6.71zm1.1-2.37l2.6-1.5 2.6 1.5v3l-2.6 1.5-2.6-1.5z"/></svg>',
    grid:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
    input:'<svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>',
    output:'<svg viewBox="0 0 24 24"><path d="M12 21V9m0 0l4 4m-4-4l-4 4"/><path d="M4 7V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/></svg>',
    cacheW:'<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
    cacheR:'<svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>',
    zap:'<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>',
};

var platformConfig = {
    anthropic: {icon:svg.anthropic, label:"ANTHROPIC", cssClass:"anthropic", fClass:"f-anthropic", pClass:"p-anthropic", featClass:"feat-anthropic"},
    openai:    {icon:svg.openai,    label:"OPENAI",    cssClass:"openai",    fClass:"f-openai",    pClass:"p-openai",    featClass:"feat-openai"},
    google:    {icon:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.85 3.19-1.79 4.13-1.15 1.15-2.94 2.41-6.05 2.41-4.83 0-8.6-3.89-8.6-8.72s3.77-8.72 8.6-8.72c2.6 0 4.51 1.02 5.91 2.36l2.32-2.32C18.36 1.19 15.73 0 12.48 0 5.73 0 .19 5.37.19 12s5.54 12 12.29 12c3.6 0 6.32-1.19 8.45-3.42 2.18-2.18 2.87-5.25 2.87-7.72 0-.77-.07-1.48-.19-2.07h-11.13z"/></svg>', label:"GOOGLE", cssClass:"google", fClass:"f-google", pClass:"p-google", featClass:"feat-google"},
    deepseek:  {icon:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>', label:"DEEPSEEK", cssClass:"deepseek", fClass:"f-deepseek", pClass:"p-deepseek", featClass:"feat-deepseek"},
};

var currentFilter = 'all';

function priceStr(v) {
    if (v === 0) return '$0';
    if (v >= 1) return '$' + v.toFixed(2);
    return '$' + v.toFixed(3);
}

function getPlatforms() {
    var map = {};
    models.forEach(function(m) {
        if (!map[m.platform]) map[m.platform] = 0;
        map[m.platform]++;
    });
    return map;
}

function renderStats() {
    var platforms = getPlatforms();
    var html = '<div class="stat-card"><div class="stat-icon total">' + svg.grid + '</div><div><div class="stat-label">模型总数</div><div class="stat-value">' + models.length + '</div></div></div>';
    Object.keys(platforms).forEach(function(p) {
        var cfg = platformConfig[p];
        if (cfg) {
            html += '<div class="stat-card"><div class="stat-icon ' + cfg.cssClass + '">' + cfg.icon + '</div><div><div class="stat-label">' + cfg.label + '</div><div class="stat-value">' + platforms[p] + '</div></div></div>';
        }
    });
    document.getElementById('stats-row').innerHTML = html;
}

function renderFilters() {
    var platforms = getPlatforms();
    var html = '<div class="filter-tab active" onclick="setFilter(\'all\',this)">全部 <span class="count">' + models.length + '</span></div>';
    Object.keys(platforms).forEach(function(p) {
        var cfg = platformConfig[p];
        if (cfg) {
            html += '<div class="filter-tab" onclick="setFilter(\'' + p + '\',this)"><span class="f-icon ' + cfg.fClass + '">' + cfg.icon + '</span> ' + cfg.label + ' <span class="count">' + platforms[p] + '</span></div>';
        }
    });
    document.getElementById('filters').innerHTML = html;
}

function renderCard(m, i) {
    var cfg = platformConfig[m.platform] || platformConfig.openai;
    return '<div class="model-card" data-platform="' + m.platform + '" data-name="' + m.name + '" style="animation-delay:' + (.18 + i * .03) + 's">' +
        '<div class="card-top">' +
            '<div class="card-provider-row">' +
                '<div class="provider-icon ' + cfg.pClass + '">' + cfg.icon + '</div>' +
                '<div class="card-info">' +
                    '<div class="card-model-name">' + m.name + '</div>' +
                    '<div class="card-provider-name">' + cfg.label + '</div>' +
                '</div>' +
            '</div>' +
            '<div class="card-rate">¥1 = $1</div>' +
        '</div>' +
        '<div class="card-feature ' + cfg.featClass + '">' + svg.zap + ' Prompt Caching</div>' +
        '<div class="price-rows">' +
            '<div class="price-row"><div class="price-row-left"><span class="p-icon">' + svg.input + '</span> 输入</div><div class="price-row-right">' + priceStr(m.input) + '<span class="unit">/M</span></div></div>' +
            '<div class="price-row"><div class="price-row-left"><span class="p-icon">' + svg.output + '</span> 输出</div><div class="price-row-right">' + priceStr(m.output) + '<span class="unit">/M</span></div></div>' +
            '<div class="price-divider"></div>' +
            '<div class="price-row"><div class="price-row-left"><span class="p-icon">' + svg.cacheW + '</span> 缓存写入</div><div class="price-row-right">' + priceStr(m.cache_write) + '<span class="unit">/M</span></div></div>' +
            '<div class="price-row"><div class="price-row-left"><span class="p-icon">' + svg.cacheR + '</span> 缓存读取</div><div class="price-row-right">' + priceStr(m.cache_read) + '<span class="unit">/M</span></div></div>' +
        '</div>' +
    '</div>';
}

function renderAll() {
    renderStats();
    renderFilters();
    document.getElementById('grid').innerHTML = models.map(function(m, i) { return renderCard(m, i); }).join('');
    filterModels();
}

function filterModels() {
    var q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.model-card').forEach(function(c) {
        var p = c.dataset.platform;
        var n = c.dataset.name;
        var matchP = currentFilter === 'all' || p === currentFilter;
        var matchQ = !q || n.includes(q);
        c.style.display = matchP && matchQ ? '' : 'none';
    });
}

function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(function(b) { b.classList.remove('active'); });
    el.classList.add('active');
    filterModels();
}

document.addEventListener('DOMContentLoaded', renderAll);
</script>
</body>
</html>
